<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출장 예산 및 지출 대시보드</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts (Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f1f5f9;
    }
    /* 스크롤바 숨김 디자인 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="min-h-screen flex justify-center py-4 px-2 sm:py-8 sm:px-4">
  
  <div class="w-full max-w-md flex flex-col gap-6">
    
    <!-- 1. 출장 예산 설정 카드 -->
    <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 flex flex-col gap-5">
      <!-- 헤더 -->
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold text-slate-700">출장 예산 설정</h2>
        <span class="bg-blue-50 text-blue-600 text-xs font-semibold px-2.5 py-1 rounded-full flex items-center gap-1">
          <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
          실시간 반영
        </span>
      </div>

      <!-- 외화 통화 선택 -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-slate-500">외화 통화</label>
        <div class="grid grid-cols-4 gap-1.5 bg-slate-100 p-1.5 rounded-2xl">
          <button type="button" onclick="selectCurrency('JPY')" id="btn-JPY" class="py-2.5 rounded-xl text-sm font-bold transition-all text-center">JPY (엔)</button>
          <button type="button" onclick="selectCurrency('USD')" id="btn-USD" class="py-2.5 rounded-xl text-sm font-bold transition-all text-center">USD (달러)</button>
          <button type="button" onclick="selectCurrency('EUR')" id="btn-EUR" class="py-2.5 rounded-xl text-sm font-bold transition-all text-center">EUR (유로)</button>
          <button type="button" onclick="selectCurrency('CNY')" id="btn-CNY" class="py-2.5 rounded-xl text-sm font-bold transition-all text-center">CNY (위안)</button>
        </div>
      </div>

      <!-- 기타 통화 입력 -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-slate-500">기타 입력:</label>
        <input type="text" id="custom-currency" oninput="handleCustomCurrencyInput(this.value)" placeholder="기타 통화명 직접 입력 (예: 바트)" class="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl py-3.5 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-700">
      </div>

      <!-- 기본 일당 & 지급 비율 Grid -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-slate-500" id="label-base-allowance">기본 일당 (엔)</label>
          <input type="number" id="input-base-allowance" oninput="calculateBudget()" class="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl py-3.5 px-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-slate-500">지급 비율 (%)</label>
          <input type="number" id="input-payout-ratio" oninput="calculateBudget()" class="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl py-3.5 px-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
      </div>

      <!-- 적용 환율 & 출장 기간 Grid -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <label class="text-sm font-semibold text-slate-500" id="label-exchange-rate">적용 환율 (원/엔)</label>
            <button type="button" onclick="fetchExchangeRate()" class="text-[11px] text-blue-600 bg-blue-50 hover:bg-blue-100 font-bold px-2 py-0.5 rounded-md flex items-center gap-1 transition-all">
              <i class="fa-solid fa-arrows-rotate" id="refresh-icon"></i> 불러오기
            </button>
          </div>
          <input type="number" step="any" id="input-exchange-rate" oninput="calculateBudget()" class="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl py-3.5 px-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-slate-500">출장 기간 (일수)</label>
          <input type="number" id="input-trip-duration" oninput="calculateBudget()" class="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl py-3.5 px-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
      </div>

      <hr class="border-t border-dashed border-slate-200 my-1">

      <!-- 계산된 적용 일당 결과 -->
      <div class="grid grid-cols-2 gap-3.5">
        <div class="bg-blue-50/50 rounded-2xl p-4 text-center border border-blue-50/80">
          <p class="text-xs font-bold text-slate-400 mb-1">적용 일당 (외화)</p>
          <p class="text-base font-extrabold text-slate-700" id="result-daily-foreign">0 엔</p>
        </div>
        <div class="bg-blue-50/50 rounded-2xl p-4 text-center border border-blue-50/80">
          <p class="text-xs font-bold text-blue-500 mb-1">적용 일당 (원화)</p>
          <p class="text-base font-extrabold text-blue-600" id="result-daily-krw">0 원</p>
        </div>
      </div>
    </div>


    <!-- 2. 지출 및 잔액 대시보드 카드 -->
    <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 flex flex-col gap-6">
      <h2 class="text-lg font-bold text-slate-700">지출 및 잔액 대시보드</h2>
      
      <!-- 예산 달성 바 -->
      <div class="bg-[#f8fafc] rounded-2xl p-4 border border-slate-100">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm font-bold text-slate-500">남은 예산 비율</span>
          <span class="text-2xl font-black text-blue-600" id="progress-percent">100%</span>
        </div>
        <div class="w-full bg-slate-200 h-3.5 rounded-full overflow-hidden">
          <div id="progress-bar" class="bg-emerald-500 h-full rounded-full transition-all duration-500" style="width: 100%;"></div>
        </div>
      </div>

      <!-- 통계 지표 리스트 -->
      <div class="flex flex-col gap-5 px-1">
        <!-- 총 출장 예산 -->
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-2.5 mt-1">
            <span class="w-3 h-3 rounded-full bg-slate-300"></span>
            <span class="text-sm font-bold text-slate-600">총 출장 예산</span>
          </div>
          <div class="text-right">
            <p class="text-lg font-black text-slate-800" id="dash-total-budget-foreign">0 엔</p>
            <p class="text-xs font-semibold text-slate-400 mt-0.5" id="dash-total-budget-krw">0 원</p>
          </div>
        </div>

        <hr class="border-t border-slate-100">

        <!-- 총 사용 금액 -->
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-2.5 mt-1">
            <span class="w-3 h-3 rounded-full bg-red-500"></span>
            <span class="text-sm font-bold text-slate-600">총 사용 금액</span>
          </div>
          <div class="text-right">
            <p class="text-lg font-black text-red-500" id="dash-total-spent-foreign">0 엔</p>
            <p class="text-xs font-semibold text-red-400 mt-0.5" id="dash-total-spent-krw">0 원</p>
          </div>
        </div>

        <hr class="border-t border-slate-100">

        <!-- 남은 예산 잔액 -->
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-2.5 mt-1">
            <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
            <span class="text-sm font-bold text-slate-600">남은 예산 잔액</span>
          </div>
          <div class="text-right">
            <p class="text-lg font-black text-emerald-500" id="dash-remain-foreign">0 엔</p>
            <p class="text-xs font-semibold text-emerald-400 mt-0.5" id="dash-remain-krw">0 원</p>
          </div>
        </div>
      </div>
    </div>


    <!-- 3. 지출 내역 등록 카드 -->
    <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 flex flex-col gap-5">
      <h2 class="text-lg font-bold text-slate-700">지출 내역 등록</h2>

      <!-- 지출 화폐 선택 -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-slate-500">지출 화폐</label>
        <div class="grid grid-cols-2 gap-1.5 bg-slate-100 p-1.5 rounded-2xl">
          <button type="button" onclick="selectExpenseCurrency('KRW')" id="btn-exp-KRW" class="py-2.5 rounded-xl text-sm font-bold transition-all text-center">원화 (KRW) 지출</button>
          <button type="button" onclick="selectExpenseCurrency('FOREIGN')" id="btn-exp-FOREIGN" class="py-2.5 rounded-xl text-sm font-bold transition-all text-center">외화 (엔) 지출</button>
        </div>
      </div>

      <!-- 카테고리 선택 -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-slate-500">카테고리</label>
        <div class="grid grid-cols-5 gap-1.5 overflow-x-auto no-scrollbar">
          <button type="button" onclick="selectCategory('식비')" id="cat-식비" class="py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap">식비</button>
          <button type="button" onclick="selectCategory('교통')" id="cat-교통" class="py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap">교통</button>
          <button type="button" onclick="selectCategory('숙박')" id="cat-숙박" class="py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap">숙박</button>
          <button type="button" onclick="selectCategory('쇼핑')" id="cat-쇼핑" class="py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap">쇼핑</button>
          <button type="button" onclick="selectCategory('기타')" id="cat-기타" class="py-2 rounded-xl text-xs font-bold transition-all text-center whitespace-nowrap">기타</button>
        </div>
      </div>

      <!-- 사용 날짜 & 사용 내역 -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-slate-500">사용 날짜</label>
          <input type="date" id="input-exp-date" class="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl py-3.5 px-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-slate-500">사용 내역</label>
          <!-- 플레이스홀더 문구를 사용자가 쉽게 이해할 수 있도록 보완 -->
          <input type="text" id="input-exp-desc" placeholder="예: 택시비 (미입력 시 카테고리명)" class="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl py-3.5 px-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
        </div>
      </div>

      <!-- 지출 금액 입력 -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-slate-500" id="label-expense-amount">지출 금액 (원)</label>
        <input type="number" id="input-exp-amount" placeholder="0" class="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl py-3.5 px-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
      </div>

      <!-- 지출 내역 등록 버튼 -->
      <button type="button" onclick="addExpense()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all mt-1">
        <i class="fa-solid fa-plus"></i> 지출 내역 등록
      </button>
    </div>


    <!-- 4. 등록된 지출 내역 리스트 카드 -->
    <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 flex flex-col gap-4">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold text-slate-700">상세 지출 내역</h2>
        <button onclick="clearAllExpenses()" class="text-xs text-red-500 font-bold hover:bg-red-50 px-2 py-1 rounded transition-all">전체 삭제</button>
      </div>
      
      <!-- 내역 리스트 부모 -->
      <div id="expense-list" class="flex flex-col gap-3 max-h-[300px] overflow-y-auto no-scrollbar">
        <!-- 동적으로 지출 리스트 생성됨 -->
      </div>
      
      <p id="empty-list-msg" class="text-slate-400 text-center py-6 text-sm">등록된 지출 내역이 없습니다.</p>
    </div>

  </div>

  <!-- 사용자 정의 모달창 알림 (alert 대체용 브라우저 친화형 디자인) -->
  <div id="alert-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4 transition-all opacity-0">
    <div class="bg-white rounded-[2rem] w-full max-w-xs p-6 shadow-xl flex flex-col items-center text-center gap-4">
      <div class="w-12 h-12 rounded-full bg-amber-50 text-amber-500 flex items-center justify-center text-xl">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <div>
        <h4 class="font-bold text-slate-800 text-base" id="modal-title">알림</h4>
        <p class="text-slate-500 text-xs mt-1.5 whitespace-pre-line leading-relaxed" id="modal-message">내용을 입력해주세요.</p>
      </div>
      <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-3 rounded-xl transition-all">확인</button>
    </div>
  </div>

  <script>
    // --- 초기 상태 및 변수 관리 ---
    const STATE_KEY = 'business_trip_budget_state';
    
    // 모의 기본 환율 정보들
    const mockExchangeRates = {
      JPY: 9.2928, // 1엔당 원화 환율
      USD: 1350.50,
      EUR: 1450.25,
      CNY: 185.75,
      CUSTOM: 10.00
    };

    const currencySymbols = {
      JPY: '엔',
      USD: '달러',
      EUR: '유로',
      CNY: '위안',
      CUSTOM: '외화'
    };

    let state = {
      selectedCurrency: 'JPY',
      customCurrencyName: '',
      baseAllowance: 55000,
      payoutRatio: 90,
      exchangeRate: 9.2928,
      tripDuration: 1, 
      expenseCurrencyMode: 'KRW', // 'KRW' or 'FOREIGN'
      selectedCategory: '식비',
      expenses: []
    };

    // --- 초기 실행 코드 ---
    window.onload = function() {
      // 로컬 스토리지 복구 시도
      const savedState = localStorage.getItem(STATE_KEY);
      if (savedState) {
        try {
          state = JSON.parse(savedState);
        } catch (e) {
          console.error("저장된 데이터를 불러오는 도중 오류 발생", e);
        }
      }

      // UI 입력 필드 초기값 바인딩
      initUI();
      calculateBudget();
    };

    // UI 요소 채우기
    function initUI() {
      document.getElementById('custom-currency').value = state.customCurrencyName;
      document.getElementById('input-base-allowance').value = state.baseAllowance;
      document.getElementById('input-payout-ratio').value = state.payoutRatio;
      document.getElementById('input-exchange-rate').value = state.exchangeRate;
      document.getElementById('input-trip-duration').value = state.tripDuration;
      
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('input-exp-date').value = today;

      updateCurrencyTabsUI();
      updateExpenseCurrencyTabsUI();
      updateCategoryUI();
      updateLabels();
    }

    // 로컬 스토리지에 데이터 저장
    function saveState() {
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    // 커스텀 알림 모달 출력
    function showAlert(title, message) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;
      
      const modal = document.getElementById('alert-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
      }, 50);
    }

    function closeModal() {
      const modal = document.getElementById('alert-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => {
        modal.classList.remove('flex');
        modal.classList.add('hidden');
      }, 200);
    }

    // --- 통화 선택 및 입력 UI 이벤트 핸들러 ---
    function selectCurrency(curr) {
      state.selectedCurrency = curr;
      
      // 환율 자동 셋팅 (커스텀 외)
      if (curr !== 'CUSTOM') {
        state.exchangeRate = mockExchangeRates[curr];
        document.getElementById('input-exchange-rate').value = state.exchangeRate;
        state.customCurrencyName = '';
        document.getElementById('custom-currency').value = '';
      } else {
        state.exchangeRate = mockExchangeRates['CUSTOM'];
        document.getElementById('input-exchange-rate').value = state.exchangeRate;
      }

      updateCurrencyTabsUI();
      updateLabels();
      calculateBudget();
      saveState();
    }

    function handleCustomCurrencyInput(val) {
      state.customCurrencyName = val.trim();
      if (state.customCurrencyName) {
        state.selectedCurrency = 'CUSTOM';
      } else {
        state.selectedCurrency = 'JPY';
        state.exchangeRate = mockExchangeRates['JPY'];
        document.getElementById('input-exchange-rate').value = state.exchangeRate;
      }
      updateCurrencyTabsUI();
      updateLabels();
      calculateBudget();
      saveState();
    }

    function updateCurrencyTabsUI() {
      const currencies = ['JPY', 'USD', 'EUR', 'CNY'];
      currencies.forEach(curr => {
        const btn = document.getElementById(`btn-${curr}`);
        if (state.selectedCurrency === curr) {
          btn.className = "py-2.5 rounded-xl text-sm font-extrabold text-slate-800 bg-white shadow-sm border border-slate-200/50 text-center transition-all duration-200";
        } else {
          btn.className = "py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-700 text-center transition-all duration-200";
        }
      });
    }

    // 라벨들 동적 변경
    function updateLabels() {
      const unit = getCurrencyUnit();
      document.getElementById('label-base-allowance').textContent = `기본 일당 (${unit})`;
      document.getElementById('label-exchange-rate').textContent = `적용 환율 (원/${unit})`;
      
      // 지출 탭 라벨 업데이트
      document.getElementById('btn-exp-FOREIGN').textContent = `외화 (${unit}) 지출`;
      updateExpenseCurrencyTabsUI();
    }

    // 사용중인 현재 외화 기호/글자 가져오기
    function getCurrencyUnit() {
      if (state.selectedCurrency === 'CUSTOM') {
        return state.customCurrencyName || '외화';
      }
      return currencySymbols[state.selectedCurrency];
    }

    // --- 실시간 환율 정보 가져오기 시뮬레이션 ---
    function fetchExchangeRate() {
      const icon = document.getElementById('refresh-icon');
      icon.classList.add('animate-spin');

      // 가상 서버 패치 애니메이션 효과
      setTimeout(() => {
        let baseRate = mockExchangeRates[state.selectedCurrency] || 1000;
        // 약간의 랜덤 오차를 두어 변동 환율 체감 부여
        const fluctuation = (Math.random() - 0.5) * (baseRate * 0.01);
        const newRate = parseFloat((baseRate + fluctuation).toFixed(4));
        
        state.exchangeRate = newRate;
        document.getElementById('input-exchange-rate').value = newRate;
        icon.classList.remove('animate-spin');

        calculateBudget();
        saveState();
      }, 700);
    }

    // --- 실시간 예산 및 일당 자동 계산 함수 ---
    function calculateBudget() {
      // 입력값 데이터 추출
      state.baseAllowance = parseFloat(document.getElementById('input-base-allowance').value) || 0;
      state.payoutRatio = parseFloat(document.getElementById('input-payout-ratio').value) || 0;
      state.exchangeRate = parseFloat(document.getElementById('input-exchange-rate').value) || 0;
      state.tripDuration = parseInt(document.getElementById('input-trip-duration').value) || 0;

      const unit = getCurrencyUnit();

      // 1. 적용 일당 (외화) = 기본일당 * 지급비율
      const appliedDailyAllowanceForeign = state.baseAllowance * (state.payoutRatio / 100);
      document.getElementById('result-daily-foreign').textContent = `${formatNumber(appliedDailyAllowanceForeign)} ${unit}`;

      // 2. 적용 일당 (원화) = 적용 일당 (외화) * 환율
      const appliedDailyAllowanceKRW = appliedDailyAllowanceForeign * state.exchangeRate;
      document.getElementById('result-daily-krw').textContent = `${formatNumber(Math.round(appliedDailyAllowanceKRW))} 원`;

      // 3. 총 출장 예산 (외화) = 적용일당(외화) * 출장 기간
      const totalBudgetForeign = appliedDailyAllowanceForeign * state.tripDuration;
      document.getElementById('dash-total-budget-foreign').textContent = `${formatNumber(totalBudgetForeign)} ${unit}`;

      // 4. 총 출장 예산 (원화) = 총 출장 예산(외화) * 환율
      const totalBudgetKRW = totalBudgetForeign * state.exchangeRate;
      document.getElementById('dash-total-budget-krw').textContent = `${formatNumber(Math.round(totalBudgetKRW))} 원`;

      // 대시보드 지출 내역 계산 반영하기
      recalculateDashboard(totalBudgetForeign, totalBudgetKRW, unit);
      saveState();
    }

    // --- 대시보드 사용금액 및 잔액 실시간 통합 계산 ---
    function recalculateDashboard(totalBudgetForeign, totalBudgetKRW, unit) {
      let totalSpentForeign = 0;
      let totalSpentKRW = 0;

      state.expenses.forEach(exp => {
        if (exp.currencyMode === 'KRW') {
          // 원화로 사용한 경우 -> 외화 가치 산출 = 원화 / 환율
          totalSpentKRW += exp.amount;
          if (state.exchangeRate > 0) {
            totalSpentForeign += exp.amount / state.exchangeRate;
          }
        } else {
          // 외화로 사용한 경우 -> 원화 가치 산출 = 외화 * 환율
          totalSpentForeign += exp.amount;
          totalSpentKRW += exp.amount * state.exchangeRate;
        }
      });

      // 남은 잔액
      const remainForeign = totalBudgetForeign - totalSpentForeign;
      const remainKRW = totalBudgetKRW - totalSpentKRW;

      // 퍼센트 계산
      let remainPercent = 100;
      if (totalBudgetKRW > 0) {
        remainPercent = Math.max(0, Math.round((remainKRW / totalBudgetKRW) * 100));
      } else if (totalSpentKRW > 0) {
        remainPercent = 0; // 예산이 없는데 썼을경우 잔량 0%
      }

      // UI 요소 대입
      document.getElementById('dash-total-spent-foreign').textContent = `${formatNumber(totalSpentForeign)} ${unit}`;
      document.getElementById('dash-total-spent-krw').textContent = `${formatNumber(Math.round(totalSpentKRW))} 원`;

      // 음수 잔액 처리 지원
      if (remainForeign < 0) {
        document.getElementById('dash-remain-foreign').textContent = `-${formatNumber(Math.abs(remainForeign))} ${unit}`;
        document.getElementById('dash-remain-foreign').className = "text-lg font-black text-rose-600";
      } else {
        document.getElementById('dash-remain-foreign').textContent = `${formatNumber(remainForeign)} ${unit}`;
        document.getElementById('dash-remain-foreign').className = "text-lg font-black text-emerald-500";
      }

      if (remainKRW < 0) {
        document.getElementById('dash-remain-krw').textContent = `-${formatNumber(Math.round(Math.abs(remainKRW)))} 원`;
        document.getElementById('dash-remain-krw').className = "text-xs font-semibold text-rose-400 mt-0.5";
      } else {
        document.getElementById('dash-remain-krw').textContent = `${formatNumber(Math.round(remainKRW))} 원`;
        document.getElementById('dash-remain-krw').className = "text-xs font-semibold text-emerald-400 mt-0.5";
      }

      // 남은 예산 비율 게이지 업데이트
      document.getElementById('progress-percent').textContent = `${remainPercent}%`;
      const progressBar = document.getElementById('progress-bar');
      progressBar.style.width = `${remainPercent}%`;

      // 게이지 바 색상 피드백
      if (remainPercent > 50) {
        progressBar.className = "bg-emerald-500 h-full rounded-full transition-all duration-500";
        document.getElementById('progress-percent').className = "text-2xl font-black text-blue-600";
      } else if (remainPercent > 15) {
        progressBar.className = "bg-amber-400 h-full rounded-full transition-all duration-500";
        document.getElementById('progress-percent').className = "text-2xl font-black text-amber-500";
      } else {
        progressBar.className = "bg-red-500 h-full rounded-full transition-all duration-500";
        document.getElementById('progress-percent').className = "text-2xl font-black text-red-500 animate-pulse";
      }

      renderExpenseList();
    }

    // --- 지출 내역 등록 관련 로직 ---
    function selectExpenseCurrency(mode) {
      state.expenseCurrencyMode = mode;
      updateExpenseCurrencyTabsUI();
      saveState();
    }

    function updateExpenseCurrencyTabsUI() {
      const btnKRW = document.getElementById('btn-exp-KRW');
      const btnFOREIGN = document.getElementById('btn-exp-FOREIGN');
      const inputAmountLabel = document.getElementById('label-expense-amount');
      const unit = getCurrencyUnit();

      if (state.expenseCurrencyMode === 'KRW') {
        btnKRW.className = "py-2.5 rounded-xl text-sm font-extrabold text-slate-800 bg-white shadow-sm border border-slate-200/50 text-center transition-all duration-200";
        btnFOREIGN.className = "py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-700 text-center transition-all duration-200";
        inputAmountLabel.textContent = "지출 금액 (원)";
      } else {
        btnFOREIGN.className = "py-2.5 rounded-xl text-sm font-extrabold text-slate-800 bg-white shadow-sm border border-slate-200/50 text-center transition-all duration-200";
        btnKRW.className = "py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-700 text-center transition-all duration-200";
        inputAmountLabel.textContent = `지출 금액 (${unit})`;
      }
    }

    function selectCategory(cat) {
      state.selectedCategory = cat;
      updateCategoryUI();
      saveState();
    }

    function updateCategoryUI() {
      const categories = ['식비', '교통', '숙박', '쇼핑', '기타'];
      categories.forEach(cat => {
        const btn = document.getElementById(`cat-${cat}`);
        if (state.selectedCategory === cat) {
          btn.className = "py-2.5 px-4 rounded-xl text-xs font-bold bg-blue-50 text-blue-600 border border-blue-100 transition-all text-center whitespace-nowrap";
        } else {
          btn.className = "py-2.5 px-4 rounded-xl text-xs font-semibold bg-[#f8fafc] text-slate-500 hover:bg-slate-100 hover:text-slate-700 border border-transparent transition-all text-center whitespace-nowrap";
        }
      });
    }

    // 지출 내역 등록
    function addExpense() {
      const dateVal = document.getElementById('input-exp-date').value;
      let descVal = document.getElementById('input-exp-desc').value.trim();
      const amountVal = parseFloat(document.getElementById('input-exp-amount').value) || 0;

      if (!dateVal) {
        showAlert('등록 오류', '사용 날짜를 선택해주세요.');
        return;
      }
      
      // 사용 내역을 입력하지 않은 경우 현재 선택된 카테고리 항목명으로 자동 설정
      if (!descVal) {
        descVal = state.selectedCategory;
      }
      
      if (amountVal <= 0) {
        showAlert('등록 오류', '지출 금액은 0보다 커야 등록할 수 있습니다.');
        return;
      }

      const newExpense = {
        id: 'exp-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4),
        date: dateVal,
        description: descVal,
        amount: amountVal,
        currencyMode: state.expenseCurrencyMode,
        category: state.selectedCategory
      };

      state.expenses.unshift(newExpense); // 최근 내역이 위로 오게 배치

      // 지출 입력 칸 비우기
      document.getElementById('input-exp-desc').value = '';
      document.getElementById('input-exp-amount').value = '';

      calculateBudget();
      saveState();
    }

    // 특정 지출 내역 삭제
    function deleteExpense(id) {
      state.expenses = state.expenses.filter(item => item.id !== id);
      calculateBudget();
      saveState();
    }

    // 모든 지출 삭제
    function clearAllExpenses() {
      if (state.expenses.length === 0) return;
      state.expenses = [];
      calculateBudget();
      saveState();
    }

    // --- 동적 상세 지출 내역 UI 생성기 ---
    function renderExpenseList() {
      const container = document.getElementById('expense-list');
      const emptyMsg = document.getElementById('empty-list-msg');
      container.innerHTML = '';

      if (state.expenses.length === 0) {
        emptyMsg.classList.remove('hidden');
        return;
      }

      emptyMsg.classList.add('hidden');
      const unit = getCurrencyUnit();

      state.expenses.forEach(exp => {
        const item = document.createElement('div');
        item.className = "flex items-center justify-between bg-[#f8fafc] border border-slate-100 rounded-2xl p-4 transition-all hover:bg-slate-50";

        // 카테고리별 아바타 아이콘 맵
        const iconMap = {
          '식비': '<i class="fa-solid fa-utensils"></i>',
          '교통': '<i class="fa-solid fa-car-side"></i>',
          '숙박': '<i class="fa-solid fa-bed"></i>',
          '쇼핑': '<i class="fa-solid fa-bag-shopping"></i>',
          '기타': '<i class="fa-solid fa-asterisk"></i>'
        };
        const iconHtml = iconMap[exp.category] || iconMap['기타'];

        const currencySymbolText = exp.currencyMode === 'KRW' ? '원' : unit;

        // 원화/외화 환산 텍스트 생성
        let subText = '';
        if (exp.currencyMode === 'KRW') {
          const convertedForeign = state.exchangeRate > 0 ? (exp.amount / state.exchangeRate) : 0;
          subText = `≈ ${formatNumber(convertedForeign)} ${unit}`;
        } else {
          const convertedKRW = exp.amount * state.exchangeRate;
          subText = `≈ ${formatNumber(Math.round(convertedKRW))} 원`;
        }

        item.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center text-sm">
              ${iconHtml}
            </div>
            <div>
              <p class="text-sm font-bold text-slate-700">${exp.description}</p>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span class="text-[10px] text-slate-400 font-semibold">${exp.date}</span>
                <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                <span class="text-[10px] text-blue-500 font-extrabold bg-blue-50/70 px-1.5 py-0.5 rounded-md">${exp.category}</span>
              </div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="text-right">
              <p class="text-sm font-black text-slate-800">${formatNumber(exp.amount)} ${currencySymbolText}</p>
              <p class="text-[10px] text-slate-400 font-medium mt-0.5">${subText}</p>
            </div>
            <button onclick="deleteExpense('${exp.id}')" class="text-slate-300 hover:text-rose-500 p-1 rounded-lg hover:bg-slate-100 transition-all">
              <i class="fa-regular fa-trash-can"></i>
            </button>
          </div>
        `;
        container.appendChild(item);
      });
    }

    // --- 유틸리티 포맷팅 함수 ---
    function formatNumber(num) {
      if (num === null || isNaN(num)) return '0';
      // 소수점 4자리 한정 및 정수 컴마 분리 정밀화
      if (num % 1 !== 0) {
        const parts = num.toFixed(2).split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join('.');
      }
      return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
  </script>
